<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Угадай футболиста!</title>

<style>
  :root {
    --green: #2e7d32;
    --green-dark: #1b5e20;
    --accent: #ffd54f;
    --red: #e53935;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: radial-gradient(ellipse at center, #388e3c 0%, var(--green-dark) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    padding: 24px;
    text-align: center;
  }
  h1 { color: var(--green-dark); margin: 0 0 8px; font-size: 26px; }
  p.sub { color: #555; margin-top: 0; }
  button.big {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: transform .1s;
  }
  button.big:hover { transform: scale(1.03); }
  button.big:disabled { opacity: 0.6; cursor: default; }

  .options {
    margin: 16px 0 4px;
    text-align: left;
  }
  .opt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #f1f8f1;
    border: 2px solid #cfe8cf;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    font-weight: 600;
    color: #1b3a1b;
  }
  .opt-row input { width: 18px; height: 18px; flex-shrink: 0; }
  .opt-row small { display: block; font-weight: 400; color: #555; font-size: 12px; }

  #hud {
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 8px;
    font-size: 15px;
  }
  #timerBar {
    height: 8px;
    border-radius: 6px;
    background: #eee;
    overflow: hidden;
    margin-bottom: 16px;
  }
  #timerFill {
    height: 100%;
    width: 100%;
    background: var(--accent);
    transition: width 0.1s linear;
  }
  #photoWrap {
    width: 100%;
    max-width: 280px;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    background: #eaeaea;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
  }
  #photoWrap img { width: 100%; height: 100%; object-fit: cover; }
  .placeholder-icon { font-size: 64px; }

  #answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ans-btn {
    background: #f1f8f1;
    border: 2px solid #cfe8cf;
    border-radius: 12px;
    padding: 14px 8px;
    font-size: 15px;
    font-weight: 600;
    color: #1b3a1b;
    cursor: pointer;
  }
  .ans-btn:hover { background: #e2f3e2; }
  .ans-btn.correct {
    background: #a5d6a7;
    border-color: #66bb6a;
    animation: correctPulse 0.55s ease;
  }
  .ans-btn.wrong {
    background: #ef9a9a;
    border-color: var(--red);
    animation: wrongShake 0.5s ease;
  }
  .ans-btn:disabled { cursor: default; }

  @keyframes correctPulse {
    0%   { transform: scale(1); box-shadow: 0 0 0 0 rgba(102,187,106,0.5); }
    35%  { transform: scale(1.14); box-shadow: 0 0 0 10px rgba(102,187,106,0.25); }
    65%  { transform: scale(0.96); box-shadow: 0 0 0 4px rgba(102,187,106,0.12); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(102,187,106,0); }
  }
  @keyframes wrongShake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(3px); }
    30%, 50%, 70% { transform: translateX(-6px); }
    40%, 60% { transform: translateX(6px); }
  }

  .confetti-piece {
    position: fixed;
    top: 0;
    left: 0;
    font-size: 20px;
    line-height: 1;
    pointer-events: none;
    z-index: 9999;
    will-change: transform, opacity;
    animation: confettiFly 0.9s ease-out forwards;
  }
  @keyframes confettiFly {
    0%   { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.4) rotate(var(--rot)); opacity: 0; }
  }

  #loading { color: var(--green-dark); font-weight: 600; padding: 20px 0; }
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid #cfe8cf;
    border-top-color: var(--green);
    border-radius: 50%;
    margin: 12px auto;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #resultsScreen table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
  #resultsScreen td { padding: 4px 2px; border-bottom: 1px solid #eee; text-align: left; }
  .tag-team { color: #6a1b9a; font-weight: 600; }

  .hidden { display: none !important; }

  #errorBanner {
    background: #ffebee;
    color: #b71c1c;
    border: 2px solid #ef9a9a;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    text-align: left;
    margin-bottom: 14px;
    white-space: pre-wrap;
  }
  #nextBtnWrap { margin-top: 12px; }
</style>
</head>
<body>

<div class="card">

  <div id="errorBanner" class="hidden"></div>

  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>⚽ Угадай футболиста!</h1>
    <p class="sub">Фото — 4 варианта имени. Поехали!</p>
    <div class="options">
      <label class="opt-row">
        <input type="checkbox" id="toggleTeam">
        <span>+STARS <small>(добавить своих ребят из команды)</small></span>
      </label>
      <label class="opt-row">
        <input type="checkbox" id="toggleLegends" checked>
        <span>+ЛЕГЕНДЫ <small>(добавить легенд футбола прошлого)</small></span>
      </label>
      <label class="opt-row">
        <input type="checkbox" id="toggleWC26" checked>
        <span>+ЧМ26 <small>(сборные-полуфиналисты: Франция, Испания, Аргентина, Англия)</small></span>
      </label>
      <label class="opt-row">
        <input type="checkbox" id="toggleTimer">
        <span>Без таймера <small>(без ограничения по времени на ответ)</small></span>
      </label>
    </div>
    <button class="big" id="startBtn">Начать игру</button>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading" class="hidden">
    Загружаем фото игроков...
    <div class="spinner"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="hidden">
    <div id="hud">
      <span id="questionCounter">Вопрос 1/20</span>
      <span id="scoreDisplay">Очки: 0</span>
    </div>
    <div id="timerBar"><div id="timerFill"></div></div>
    <div id="photoWrap"><div class="placeholder-icon">⚽</div></div>
    <div id="answers"></div>
    <div id="nextBtnWrap" class="hidden">
      <button class="big" id="nextBtn">Дальше →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="resultsScreen" class="hidden">
    <h1>Игра окончена!</h1>
    <p class="sub" id="finalScoreText"></p>
    <table id="resultsTable"></table>
    <button class="big" id="retryBtn">Играть снова</button>
  </div>

</div>

/* ============================================================
   ЗВУК — синтезируем прямо в браузере через Web Audio API,
   без внешних файлов. "Дзынь" на правильный ответ, "бум" на
   неправильный, тиканье на последних 3 секундах таймера.
   ============================================================ */
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(ctx, startTime, freq, duration, type, peakGain) {
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(peakGain, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain).connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.02);
}

function playCorrectSound() {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var now = ctx.currentTime;
  // короткий "дзынь" — два восходящих колокольчатых тона
  playTone(ctx, now, 1046.5, 0.28, 'sine', 0.3);       // C6
  playTone(ctx, now + 0.07, 1568, 0.32, 'sine', 0.28); // G6
}

function playWrongSound() {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var now = ctx.currentTime;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(160, now);
  osc.frequency.exponentialRampToValueAtTime(45, now + 0.28);
  gain.gain.setValueAtTime(0.35, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
  osc.connect(gain).connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.34);
}

function playTickSound() {
  var ctx = getAudioCtx();
  if (!ctx) return;
  playTone(ctx, ctx.currentTime, 1000, 0.07, 'square', 0.22);
}

function fetchPhoto(title) {
  var url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(title.replace(/ /g, '_'));
  return fetch(url)
    .then(function (res) {
      if (!res.ok) return null;
      return res.json();
    })
    .then(function (data) {
      return (data && data.thumbnail && data.thumbnail.source) ? data.thumbnail.source : null;
    })
    .catch(function () {
      return null;
    });
}

function buildPool() {
  // У звёзд и легенд фото — это, как правило, портретные "инфобокс"-снимки
  // с Wikipedia, где лицо ближе к верху кадра, поэтому по умолчанию
  // смещаем обрезку к верху. У своих ребят (TEAM_PLAYERS) фото другие
  // (кадры с матчей), поэтому у них по умолчанию центр — см. ниже.
  var starPromises = STAR_PLAYERS.map(function (p) {
    return fetchPhoto(p.title).then(function (img) {
      return img ? { name: p.name, img: img, isTeam: false, isLegend: false, isWC26: false, pos: p.pos || '50% 20%' } : null;
    });
  });
  var legendPromises = LEGENDS.map(function (p) {
    return fetchPhoto(p.title).then(function (img) {
      return img ? { name: p.name, img: img, isTeam: false, isLegend: true, isWC26: false, pos: p.pos || '50% 20%' } : null;
    });
  });
  // Игроки сборных-полуфиналистов ЧМ-2026 — фото тоже с Wikipedia,
  // как у звёзд и легенд, плюс поле team для флажка в результатах.
  var wc26Promises = WC26_SEMIFINALISTS.map(function (p) {
    return fetchPhoto(p.title).then(function (img) {
      return img ? { name: p.name, img: img, isTeam: false, isLegend: false, isWC26: true, team: p.team, pos: p.pos || '50% 20%' } : null;
    });
  });
  return Promise.all(starPromises.concat(legendPromises).concat(wc26Promises)).then(function (results) {
    var stars = results.slice(0, starPromises.length).filter(function (x) { return x; });
    var legends = results.slice(starPromises.length, starPromises.length + legendPromises.length).filter(function (x) { return x; });
    var wc26 = results.slice(starPromises.length + legendPromises.length).filter(function (x) { return x; });
    var team = TEAM_PLAYERS.map(function (p) {
      return { name: p.name, img: p.img, isTeam: true, isLegend: false, isWC26: false, pos: p.pos || '50% 50%' };
    });
    return { stars: stars, legends: legends, wc26: wc26, team: team };
  });
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// Честная ротация: кто реже попадался в игре — у того больше шансов
// выпасть сейчас. Храним счётчики показов в localStorage, поэтому
// одни и те же лица не будут выпадать чаще других на длинной дистанции.
function loadShowCounts() {
  try {
    return JSON.parse(localStorage.getItem('quizShowCounts') || '{}');
  } catch (e) {
    return {};
  }
}
function saveShowCounts(counts) {
  try {
    localStorage.setItem('quizShowCounts', JSON.stringify(counts));
  } catch (e) { /* localStorage недоступен — просто не сохраняем */ }
}
function pickFair(list, n, counts) {
  var withCounts = list.map(function (item) {
    return { item: item, cnt: counts[item.name] || 0, rnd: Math.random() };
  });
  withCounts.sort(function (a, b) {
    if (a.cnt !== b.cnt) return a.cnt - b.cnt;
    return a.rnd - b.rnd;
  });
  var picked = withCounts.slice(0, n).map(function (x) { return x.item; });
  picked.forEach(function (p) { counts[p.name] = (counts[p.name] || 0) + 1; });
  return shuffle(picked);
}

function startGame() {
  getAudioCtx(); // разблокируем звук по жесту пользователя (клик по кнопке)
  var includeTeam = toggleTeam.checked;
  var includeLegends = toggleLegends.checked;
  var includeWC26 = toggleWC26.checked;
  timerEnabled = !toggleTimer.checked;

  startScreen.classList.add('hidden');
  resultsScreen.classList.add('hidden');
  loadingScreen.classList.remove('hidden');
  loadingScreen.innerHTML = 'Загружаем фото игроков...<div class="spinner"></div>';

  buildPool().then(function (res) {
    var stars = res.stars;
    var legends = includeLegends ? res.legends : [];
    var wc26 = includeWC26 ? res.wc26 : [];
    var team = includeTeam ? res.team : [];

    if (stars.length < 4) {
      loadingScreen.innerHTML =
        'Не удалось загрузить фото игроков.<br><br>' +
        'Проверь подключение к интернету. Если файл открыт локально ' +
        '(не по веб-ссылке), браузер может блокировать загрузку фото — ' +
        'открой игру через хостинг по обычной ссылке (например Netlify Drop).';
      return;
    }

    pool = stars.concat(legends).concat(wc26).concat(team);

    // Собираем вопросы: 5 легенд + 5 игроков ЧМ26 + 4 своих (если включено)
    // + добор звёздами. Кто реже попадался — у того больше шансов выпасть
    // сейчас (см. pickFair).
    var counts = loadShowCounts();
    var correctAnswers = [];

    var legendSlots = Math.min(legends.length, LEGENDS_PER_GAME);
    correctAnswers = correctAnswers.concat(pickFair(legends, legendSlots, counts));

    var wc26Slots = Math.min(wc26.length, WC26_PER_GAME);
    correctAnswers = correctAnswers.concat(pickFair(wc26, wc26Slots, counts));

    var teamSlots = Math.min(team.length, MAX_TEAM_PER_GAME);
    correctAnswers = correctAnswers.concat(pickFair(team, teamSlots, counts));

    var starsNeeded = TOTAL_QUESTIONS - correctAnswers.length;
    correctAnswers = correctAnswers.concat(pickFair(stars, Math.min(starsNeeded, stars.length), counts));

    saveShowCounts(counts);

    questions = shuffle(correctAnswers).map(function (correct) {
      var distractorsSource = shuffle(pool.filter(function (p) { return p.name !== correct.name; })).slice(0, 3);
      var options = shuffle([correct].concat(distractorsSource));
      return { correct: correct, options: options };
    });

    score = 0;
    currentIndex = 0;
    gameHistory = [];
    loadingScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    showQuestion();
  }).catch(function () {
    loadingScreen.innerHTML =
      'Не получилось загрузить фото игроков.<br><br>' +
      'Если файл открыт прямо на телефоне (не по ссылке из интернета), ' +
      'браузер часто блокирует такие запросы. Открой игру через хостинг по обычной ' +
      'ссылке (например, через хостинг Netlify Drop), и всё заработает.';
  });
}

function showQuestion() {
  answered = false;
  clearInterval(timerInterval);
  clearTimeout(advanceTimeout);
  nextBtnWrap.classList.add('hidden');
  timeLeft = ROUND_SECONDS;
  timerFill.style.width = '100%';
  timerFill.style.background = '#ffd54f';
  lastTickSecond = null;

  var q = questions[currentIndex];
  questionCounter.textContent = 'Вопрос ' + (currentIndex + 1) + '/' + TOTAL_QUESTIONS;
  scoreDisplay.textContent = 'Очки: ' + score;

  photoWrap.innerHTML = '';
  var img = document.createElement('img');
  img.src = q.correct.img;
  img.style.objectPosition = q.correct.pos || '50% 50%';
  img.onerror = function () { photoWrap.innerHTML = '<div class="placeholder-icon">⚽</div>'; };
  photoWrap.appendChild(img);

  answersEl.innerHTML = '';
  q.options.forEach(function (opt) {
    var btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt.name;
    btn.addEventListener('click', function () { selectAnswer(btn, opt, q); });
    answersEl.appendChild(btn);
  });

  if (!timerEnabled) {
    timerBar.classList.add('hidden');
    return;
  }
  timerBar.classList.remove('hidden');

  timerInterval = setInterval(function () {
    timeLeft -= 0.1;
    var pct = Math.max(0, (timeLeft / ROUND_SECONDS) * 100);
    timerFill.style.width = pct + '%';
    if (pct < 25) timerFill.style.background = '#e53935';
    var secLeft = Math.ceil(timeLeft);
    if (secLeft <= 3 && secLeft >= 1 && secLeft !== lastTickSecond) {
      lastTickSecond = secLeft;
      playTickSound();
    }
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      lockRound(null, q);
    }
  }, 100);
}

function selectAnswer(btn, opt, q) {
  if (answered) return;
  lockRound(opt, q, btn);
}

function spawnConfetti(originEl) {
  var rect = originEl.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  var pieces = ['⭐', '✨', '🎉', '🟢'];
  for (var i = 0; i < 16; i++) {
    var el = document.createElement('span');
    el.className = 'confetti-piece';
    el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
    var angle = Math.random() * Math.PI * 2;
    var dist = 60 + Math.random() * 90;
    var dx = Math.cos(angle) * dist;
    var dy = Math.sin(angle) * dist - 40;
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
    document.body.appendChild(el);
    (function (node) {
      setTimeout(function () { node.remove(); }, 950);
    })(el);
  }
}

function lockRound(chosen, q, btnEl) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  var correctIsChosen = chosen && chosen.name === q.correct.name;
  if (correctIsChosen) score++;

  var correctBtn = null;
  Array.prototype.forEach.call(answersEl.children, function (b) {
    b.disabled = true;
    if (b.textContent === q.correct.name) {
      b.classList.add('correct');
      correctBtn = b;
    } else if (b === btnEl) {
      b.classList.add('wrong');
    }
  });

  if (correctIsChosen && correctBtn) spawnConfetti(correctBtn);
  if (correctIsChosen) playCorrectSound(); else playWrongSound();

  gameHistory.push({
    name: q.correct.name,
    isTeam: q.correct.isTeam,
    isWC26: q.correct.isWC26,
    team: q.correct.team,
    correct: correctIsChosen
  });

  nextBtnWrap.classList.remove('hidden');
  advanceTimeout = setTimeout(function () {
    nextBtnWrap.classList.add('hidden');
    advanceQuestion();
  }, 1200);
}

function advanceQuestion() {
  clearTimeout(advanceTimeout);
  currentIndex++;
  if (currentIndex < questions.length) {
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  gameScreen.classList.add('hidden');
  resultsScreen.classList.remove('hidden');
  document.getElementById('finalScoreText').textContent =
    'Правильных ответов: ' + score + ' из ' + questions.length;

  var table = document.getElementById('resultsTable');
  table.innerHTML = gameHistory.map(function (h) {
    var flag = (h.isWC26 && h.team && WC26_FLAGS[h.team]) ? WC26_FLAGS[h.team] + ' ' : '';
    return '<tr><td>' + (h.correct ? '✅' : '❌') + '</td><td class="' +
      (h.isTeam ? 'tag-team' : '') + '">' + flag + h.name + '</td></tr>';
  }).join('');
}
</script>
