<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Угадай футболиста!</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --green: #2e7d32;
    --green-dark: #1b5e20;
    --accent: #ffd54f;
    --red: #e53935;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: radial-gradient(ellipse at center, #388e3c 0%, var(--green-dark) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    padding: 24px;
    text-align: center;
  }
  h1 { color: var(--green-dark); margin: 0 0 8px; font-size: 26px; }
  p.sub { color: #555; margin-top: 0; }
  button.big {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: transform .1s;
  }
  button.big:hover { transform: scale(1.03); }
  button.big:disabled { opacity: 0.6; cursor: default; }

  .options {
    margin: 16px 0 4px;
    text-align: left;
  }
  .opt-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #f1f8f1;
    border: 2px solid #cfe8cf;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    font-weight: 600;
    color: #1b3a1b;
  }
  .opt-row input { width: 18px; height: 18px; flex-shrink: 0; }
  .opt-row small { display: block; font-weight: 400; color: #555; font-size: 12px; }

  #hud {
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    color: var(--green-dark);
    margin-bottom: 8px;
    font-size: 15px;
  }
  #timerBar {
    height: 8px;
    border-radius: 6px;
    background: #eee;
    overflow: hidden;
    margin-bottom: 16px;
  }
  #timerFill {
    height: 100%;
    width: 100%;
    background: var(--accent);
    transition: width 0.1s linear;
  }
  #photoWrap {
    width: 100%;
    max-width: 280px;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    background: #eaeaea;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
  }
  #photoWrap img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 20%; }
  .placeholder-icon { font-size: 64px; }

  #answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ans-btn {
    background: #f1f8f1;
    border: 2px solid #cfe8cf;
    border-radius: 12px;
    padding: 14px 8px;
    font-size: 15px;
    font-weight: 600;
    color: #1b3a1b;
    cursor: pointer;
  }
  .ans-btn:hover { background: #e2f3e2; }
  .ans-btn.correct { background: #a5d6a7; border-color: #66bb6a; }
  .ans-btn.wrong { background: #ef9a9a; border-color: var(--red); }
  .ans-btn:disabled { cursor: default; }

  #loading { color: var(--green-dark); font-weight: 600; padding: 20px 0; }
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid #cfe8cf;
    border-top-color: var(--green);
    border-radius: 50%;
    margin: 12px auto;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #resultsScreen table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
  #resultsScreen td { padding: 4px 2px; border-bottom: 1px solid #eee; text-align: left; }
  .tag-team { color: #6a1b9a; font-weight: 600; }

  .hidden { display: none !important; }

  #errorBanner {
    background: #ffebee;
    color: #b71c1c;
    border: 2px solid #ef9a9a;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    text-align: left;
    margin-bottom: 14px;
    white-space: pre-wrap;
  }
  #nextBtnWrap { margin-top: 12px; }
</style>
</head>
<body>

<div class="card">

  <div id="errorBanner" class="hidden"></div>

  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>⚽ Угадай футболиста!</h1>
    <p class="sub">Фото — 4 варианта имени. Поехали!</p>
    <div class="options">
      <label class="opt-row">
        <input type="checkbox" id="toggleTeam">
        <span>+STARS <small>(добавить своих ребят из команды)</small></span>
      </label>
      <label class="opt-row">
        <input type="checkbox" id="toggleTimer">
        <span>Без таймера <small>(без ограничения по времени на ответ)</small></span>
      </label>
    </div>
    <button class="big" id="startBtn">Начать игру</button>
  </div>

  <!-- LOADING SCREEN -->
  <div id="loading" class="hidden">
    Загружаем фото игроков...
    <div class="spinner"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="hidden">
    <div id="hud">
      <span id="questionCounter">Вопрос 1/15</span>
      <span id="scoreDisplay">Очки: 0</span>
    </div>
    <div id="timerBar"><div id="timerFill"></div></div>
    <div id="photoWrap"><div class="placeholder-icon">⚽</div></div>
    <div id="answers"></div>
    <div id="nextBtnWrap" class="hidden">
      <button class="big" id="nextBtn">Дальше →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="resultsScreen" class="hidden">
    <h1>Игра окончена!</h1>
    <p class="sub" id="finalScoreText"></p>
    <table id="resultsTable"></table>
    <button class="big" id="retryBtn">Играть снова</button>
  </div>

</div>

/* ============================================================
   РЕБЯТА ИЗ КОМАНДЫ СЫНА — добавь сюда своих ради прикола!

   Эти ребята будут иногда появляться среди вопросов вперемешку

   ============================================================ */
var TEAM_PLAYERS = [
  { name: "Александр Георгиевич", img: "Aleksandr Trener.jpg" },

var TOTAL_QUESTIONS = 15;
var ROUND_SECONDS = 10;
var MAX_TEAM_PER_GAME = 3;

var pool = [];          // все игроки с готовым фото: {name, img}
var questions = [];     // подготовленные вопросы на эту игру
var currentIndex = 0;
var score = 0;
var timerInterval = null;
var advanceTimeout = null;
var timeLeft = ROUND_SECONDS;
var answered = false;
var gameHistory = [];   // для итогового экрана

// Если страница открыта внутри Telegram (как Mini App) — разворачиваем
// её на весь экран. Вне Telegram window.Telegram просто не существует,
// и этот блок ничего не делает.
if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

function showError(msg) {
  // Игнорируем посторонний шум от расширений браузера (кошельки и т.п.),
  // которые лезут в каждую страницу и не имеют отношения к игре.
  if (/ethereum|metamask|solana|web3|coinbase/i.test(msg)) return;
  errorBanner.textContent = 'Что-то пошло не так: ' + msg;
  errorBanner.classList.remove('hidden');
}

window.addEventListener('error', function (e) {
  showError(e.message || String(e.error));
});
window.addEventListener('unhandledrejection', function (e) {
  showError((e.reason && e.reason.message) || String(e.reason));
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
nextBtn.addEventListener('click', function () {
  nextBtnWrap.classList.add('hidden');
  advanceQuestion();
});

function fetchPhoto(title) {
  var url = "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(title.replace(/ /g, '_'));
  return fetch(url)
    .then(function (res) {
      if (!res.ok) return null;
      return res.json();
    })
    .then(function (data) {
      return (data && data.thumbnail && data.thumbnail.source) ? data.thumbnail.source : null;
    })
    .catch(function () {
      return null;
    });
}

function buildPool() {
  var promises = STAR_PLAYERS.map(function (p) {
    return fetchPhoto(p.title).then(function (img) {
      return img ? { name: p.name, img: img, isTeam: false } : null;
    });
  });
  return Promise.all(promises).then(function (results) {
    var stars = results.filter(function (x) { return x; });
    var team = TEAM_PLAYERS.map(function (p) {
      return { name: p.name, img: p.img, isTeam: true };
    });
    return { stars: stars, team: team };
  });
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startGame() {
  var includeTeam = toggleTeam.checked;
  timerEnabled = !toggleTimer.checked;

  startScreen.classList.add('hidden');
  resultsScreen.classList.add('hidden');
  loadingScreen.classList.remove('hidden');
  loadingScreen.innerHTML = 'Загружаем фото игроков...<div class="spinner"></div>';

  buildPool().then(function (res) {
    var stars = res.stars;
    var team = includeTeam ? res.team : [];

    if (stars.length < 4) {
      loadingScreen.innerHTML =
        'Не удалось загрузить фото игроков.<br><br>' +
        'Проверь подключение к интернету. Если файл открыт локально ' +
        '(не по веб-ссылке), браузер может блокировать загрузку фото — ' +
        'открой игру через хостинг по обычной ссылке (например Netlify Drop).';
      return;
    }

    pool = stars.concat(team);

    // Собираем вопросы: команда — редкие "вставки", звёзды — основа
    var teamShuffled = shuffle(team);
    var starsShuffled = shuffle(stars);
    var correctAnswers = [];

    var teamSlots = Math.min(teamShuffled.length, MAX_TEAM_PER_GAME);
    for (var i = 0; i < teamSlots; i++) correctAnswers.push(teamShuffled[i]);
    var starsNeeded = TOTAL_QUESTIONS - correctAnswers.length;
    for (var k = 0; k < starsNeeded && k < starsShuffled.length; k++) correctAnswers.push(starsShuffled[k]);

    questions = shuffle(correctAnswers).map(function (correct) {
      var distractorsSource = shuffle(pool.filter(function (p) { return p.name !== correct.name; })).slice(0, 3);
      var options = shuffle([correct].concat(distractorsSource));
      return { correct: correct, options: options };
    });

    score = 0;
    currentIndex = 0;
    gameHistory = [];
    loadingScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');
    showQuestion();
  }).catch(function () {
    loadingScreen.innerHTML =
      'Не получилось загрузить фото игроков.<br><br>' +
      'Если файл открыт прямо на телефоне (не по ссылке из интернета), ' +
      'браузер часто блокирует такие запросы. Открой игру через хостинг по обычной ' +
      'ссылке (например, через хостинг Netlify Drop), и всё заработает.';
  });
}

function showQuestion() {
  answered = false;
  clearInterval(timerInterval);
  clearTimeout(advanceTimeout);
  nextBtnWrap.classList.add('hidden');
  timeLeft = ROUND_SECONDS;
  timerFill.style.width = '100%';
  timerFill.style.background = '#ffd54f';

  var q = questions[currentIndex];
  questionCounter.textContent = 'Вопрос ' + (currentIndex + 1) + '/' + TOTAL_QUESTIONS;
  scoreDisplay.textContent = 'Очки: ' + score;

  photoWrap.innerHTML = '';
  var img = document.createElement('img');
  img.src = q.correct.img;
  img.onerror = function () { photoWrap.innerHTML = '<div class="placeholder-icon">⚽</div>'; };
  photoWrap.appendChild(img);

  answersEl.innerHTML = '';
  q.options.forEach(function (opt) {
    var btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt.name;
    btn.addEventListener('click', function () { selectAnswer(btn, opt, q); });
    answersEl.appendChild(btn);
  });

  if (!timerEnabled) {
    timerBar.classList.add('hidden');
    return;
  }
  timerBar.classList.remove('hidden');

  timerInterval = setInterval(function () {
    timeLeft -= 0.1;
    var pct = Math.max(0, (timeLeft / ROUND_SECONDS) * 100);
    timerFill.style.width = pct + '%';
    if (pct < 25) timerFill.style.background = '#e53935';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      lockRound(null, q);
    }
  }, 100);
}

function selectAnswer(btn, opt, q) {
  if (answered) return;
  lockRound(opt, q, btn);
}

function lockRound(chosen, q, btnEl) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  var correctIsChosen = chosen && chosen.name === q.correct.name;
  if (correctIsChosen) score++;

  Array.prototype.forEach.call(answersEl.children, function (b) {
    b.disabled = true;
    if (b.textContent === q.correct.name) b.classList.add('correct');
    else if (b === btnEl) b.classList.add('wrong');
  });

  gameHistory.push({
    name: q.correct.name,
    isTeam: q.correct.isTeam,
    correct: correctIsChosen
  });

  nextBtnWrap.classList.remove('hidden');
  advanceTimeout = setTimeout(function () {
    nextBtnWrap.classList.add('hidden');
    advanceQuestion();
  }, 1200);
}

function advanceQuestion() {
  clearTimeout(advanceTimeout);
  currentIndex++;
  if (currentIndex < questions.length) {
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  gameScreen.classList.add('hidden');
  resultsScreen.classList.remove('hidden');
  document.getElementById('finalScoreText').textContent =
    'Правильных ответов: ' + score + ' из ' + questions.length;

  var table = document.getElementById('resultsTable');
  table.innerHTML = gameHistory.map(function (h) {
    return '<tr><td>' + (h.correct ? '✅' : '❌') + '</td><td class="' +
      (h.isTeam ? 'tag-team' : '') + '">' + h.name +
      (h.isTeam ? ' (своя команда)' : '') + '</td></tr>';
  }).join('');
}
</script>
</body>
